<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reminders</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
      import { getFirestore } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

      // Your Firebase config (replace with your own)
      const firebaseConfig = {
        apiKey: "AIzaSyAJ3HSgUZz7BVgmmurBomasQ5XhEwgGVQE",
        authDomain: "to-do-sync-app-snk.firebaseapp.com",
        projectId: "to-do-sync-app-snk",
        storageBucket: "to-do-sync-app-snk.firebasestorage.app",
        messagingSenderId: "657256345359",
        appId: "1:657256345359:web:382b92666272b08ed0587a"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      window.db = getFirestore(app);
    </script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <header class="sidebar-header">
          <div class="sidebar-title">
            <span class="sidebar-icon">🗂️</span>
            <h2>Lists</h2>
          </div>
          <button class="icon-btn add-list-btn" id="addListBtn" title="Add List">＋</button>
        </header>
        <ul id="listContainer" class="list-container"></ul>
      </aside>

      <main class="main-content">
        <header class="main-header">
          <div class="header-left">
            <div class="app-icon">📝</div>
            <h1 id="currentListName">Reminders</h1>
          </div>
          <div class="header-right">
            <input type="text" id="searchInput" class="search-input" placeholder="Search" aria-label="Search reminders" />
            <button class="icon-btn theme-btn" id="themeToggleBtn" title="Toggle Theme">☀️</button>
            <button class="icon-btn add-task-btn" id="addTaskBtn" title="New Reminder">＋</button>
            <button class="icon-btn search-btn" id="searchBtn" title="Search Reminders">🔍</button>
          </div>
        </header>

        <div class="list-header">
          <h2 id="taskListTitle">All</h2>
          <div class="list-header-actions">
            <span class="task-count" id="taskCount">0</span>
            <button class="clear-completed-btn" id="clearCompletedBtn" title="Remove completed tasks">Clear Done</button>
          </div>
        </div>

        <ul id="taskList" class="task-list"></ul>
      </main>

      <div class="new-reminder">
        <input type="text" id="taskInput" placeholder="New Reminder" />
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
